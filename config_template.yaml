# Server configuration for promptd
#
# Usage: ./promptd -config ./config.yaml

data:
  # Root directory for all promptd data files (default: ./data).
  # Conversations are stored in <dir>/conversations, uploads in <dir>/uploads.
  # dir: "./data"

server:
  # HTTP address the server listens on, default: localhost:8080
  address: "localhost:8080"

auth:
  jwt:
    # Secret used to sign login session JWT cookies.
    # Replace this with a long random secret in production.
    secret: "replace-me"
    ttl: 24h
    cookie_name: "promptd_session"

  users:
    # Each user belongs to a tenant. Use "default" if you only have one tenant.
    # Passwords and service tokens are stored as bcrypt hashes.
    # Generate hashes with hidden prompt input:
    #   ./promptd hash-password
    #   ./promptd hash-service-token
    # - id: "alice"
    #   tenant_id: "default"
    #   password_hash: "$2a$10$replace-with-bcrypt-hash"
    #   roles: ["user"]
    #   service_tokens:
    #     - id: "ci"
    #       token_hash: "$2a$10$replace-with-bcrypt-hash"
    #       not_before: "2026-01-01T00:00:00Z"
    #       expires_at: "2026-12-31T23:59:59Z"
    #       disabled: false

roles:
  # Roles are merged by union when a user has multiple roles.
  # `super_admin: true` bypasses all model/tool/prompt restrictions within the same tenant.
  # Wildcards use glob syntax:
  #   *  matches any sequence
  #   ?  matches a single character
  #
  # Model rules support:
  #   - "*"
  #   - "provider:*"
  #   - "provider:model-pattern"
  #   - "*:model-pattern"
  #
  # Tool/system prompt rules support:
  #   - "*"
  #   - exact name
  #   - glob patterns like "get_current_*" or "Code*"
  # user:
  #   permissions:
  #     chat: true
  #     upload: true
  #     conversations_read: true
  #     conversations_write: true
  #     compact_conversation_write: true
  #     schedules_read: true
  #     schedules_write: true
  #     traces_read: false
  #   models:
  #     allow:
  #       - "openrouter:*"
  #       - "groq:model_oss*-20b*"
  #   tools:
  #     allow:
  #       - "get_current_*"
  #   system_prompts:
  #     allow:
  #       - "Code*"
  #
  # super_admin:
  #   super_admin: true

llm:
  # Global model selection method: random or round_robin (default: round_robin).
  # Can be overridden per-provider below.
  selection_method: "round_robin"

  compact_conversation:
    # Enable automatic rolling conversation compaction.
    enabled: false

    # Optional default provider and model used to generate compact summaries.
    # The configured model must still be allowed by the user's model policy.
    # If only provider is set, promptd selects an allowed model from that provider.
    # provider: "openrouter"
    # model: "openai/gpt-4o-mini"

    # Prompt used to generate or refresh the rolling conversation summary.
    default_prompt: |
      Summarize the conversation into a minimal context.
      Keep key facts, intent, and constraints.
      Remove fluff, repetition, and filler.
      Write in compact bullet-style or short phrases.

    # Auto-compact after this many user messages since the last compaction.
    after_messages: 20

    # Auto-compact after this many estimated tokens of new, un-compacted
    # conversation content since the last compaction. 0 disables token-based
    # triggering.
    after_tokens: 12000

  # Global auto-discover defaults applied to every provider that does not
  # explicitly set its own auto_discover block.
  # auto_discover:
  #   enabled: true
  #   refresh_interval: 60m

  # Trace settings for LLM round-trip data
  trace:
    # Enable or disable the LLM trace drawer in the UI (default: true)
    enabled: true
    # How long raw LLM trace data is kept on assistant messages (default: 168h = 7 days).
    # Minimum allowed value is 1h (anything lower is clamped to 1h).
    # Examples: 1m, 6h, 1d, 7d, 30d
    ttl: 7d

  # One or more LLM providers. Each must have a unique name, api_key, and base_url.
  # Model IDs should be unique across providers (first provider wins on collision).
  providers:
    - name: "openrouter"
      api_key: ""
      base_url: "https://openrouter.ai/api/v1"

      # Optional: override global selection_method for this provider
      # selection_method: "round_robin"

      # Optional: global LLM generation parameters for this provider's models.
      # Per-model params (models[].params) override these. UI sliders override both.
      # params:
      #   temperature: 0.7      # 0.0 = deterministic, 2.0 = very random
      #   top_p: 0.95
      #   max_tokens: 4096
      #   top_k: 40

      # Models to expose. Simple string or object with id/name/params.
      # These are still filtered by the authenticated user's role policy.
      # Only allowed models/providers will be selectable in conversations and schedules.
      models:
        # - "openai/gpt-4o"
        # - id: "anthropic/claude-sonnet-4-6"
        #   name: "Claude Sonnet"
        #   params:
        #     temperature: 0.3
        #     max_tokens: 8192

      # Auto-discover available models from the provider's /v1/models endpoint.
      # When enabled, replaces the static models list above. Initial fetch on startup.
      # Overrides the global llm.auto_discover setting for this provider.
      auto_discover:
        enabled: false
        refresh_interval: 60m  # Minimum: 1m. Go duration: 10s, 30m, 1h, etc.

    # Add more providers as needed:
    # - name: "groq"
    #   api_key: ""
    #   base_url: "https://api.groq.com/openai/v1/"
    #   models:
    #     - "llama-3.3-70b-versatile"

log:
  # Log level: debug, info, warn, error (default: info)
  level: "info"

mcp:
  # Number of consecutive health check failures before unregistering (default: 3)
  # health_max_failures: 3

  # Health check interval (default: 15s)
  # health_interval: 15s

  # Reconnect interval for servers that fail to connect at startup or become
  # unreachable. Can be overridden per-server. (default: 30s)
  # reconnect_interval: 30s

  # Tool call timeout. Can be overridden per-server. (default: 30s)
  # timeout: 30s

  # How often to re-list tools from each connected MCP server to pick up additions,
  # removals, or schema changes. 0 (default) disables periodic rediscovery.
  # Can be overridden per-server. Go duration format: 30s, 5m, 1h, etc.
  # tool_rediscovery_interval: 0

  # List of MCP servers to connect at startup
  servers:
    # HTTP server example:
    # - name: "my-server"
    #   url: "http://localhost:8081/mcp"
    #   auth:
    #     token: "your-auth-token"      # Optional: auth token
    #   headers:
    #     X-Custom-Header: "value"      # Optional: custom headers
    #   disabled: false                 # Optional: set to true to skip this server
    #   reconnect_interval: 30s         # Optional: overrides global reconnect_interval
    #   health_max_failures: 3          # Optional: overrides global health_max_failures
    #   health_interval: 15s            # Optional: overrides global health_interval
    #   timeout: 30s                    # Optional: overrides global timeout
    #   insecure: false                 # Optional: skip TLS certificate verification
    #   tool_rediscovery_interval: 5m   # Optional: overrides global tool_rediscovery_interval

tools:
  # Required: at least one selectable system prompt.
  system_prompts:
    # - name: "Code Reviewer"
    #   file: "/path/to/code-reviewer.txt"
    # - name: "Customer Support"
    #   file: "/path/to/customer-support.txt"

ui:
  # Optional: App name shown in the header and browser title (default: "Chatbot")
  # app_name: "My Assistant"

  # Optional: App icon shown in the header.
  # Supports emoji/text or an image URL/path like "/logo.png".
  # app_icon: "🤖"

  # Optional: Welcome screen title
  # welcome_title: "How can I help you today?"

  # Optional: AI disclaimer shown below title (default: "AI can make mistakes. Verify important info.")
  # ai_disclaimer: "AI can make mistakes. Verify important info."

  # Optional: Quick prompt suggestions shown on welcome screen
  prompt_suggestions:
    #  - "Explain how this works"
    #  - "Help me write code"
    #  - "Summarize the key points"
    #  - "What are best practices?"
