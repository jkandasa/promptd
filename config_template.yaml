# Server configuration for promptd
#
# Usage: ./promptd -config ./config.yaml

data:
  # Root directory for all promptd data files (default: ./data).
  # Conversations are stored in <dir>/conversations, uploads in <dir>/uploads.
  # dir: "./data"

server:
  # HTTP address the server listens on, default: localhost:8080
  address: "localhost:8080"

llm:
  # Required: API key for your LLM provider
  api_key: ""

  # Base URL of OpenAI-compatible API (default: OpenRouter)
  base_url: "https://openrouter.ai/api/v1"

  # Model selection method: random or round_robin
  selection_method: "round_robin"

  auto_discover:
    # Enable automatic discovery of available models from the provider's /v1/models endpoint.
    # When enabled, replaces the static 'models' list above. Background refreshes every refresh_interval.
    # Supports OpenAI-compatible APIs (OpenRouter, etc.). Initial fetch on startup + ticker.
    enabled: false
    # Refresh interval (default: 60m, minimum: 1m). Go duration format: 10s, 30m, 1h, etc.
    refresh_interval: 60m

  # Global LLM generation parameters — applied to all models unless overridden per-model.
  # All fields are optional; omit to use the provider's default.
  # Per-model params (under models[].params) override these globals.
  # Per-request UI overrides (sliders in the chat input) override both.
  #
  # params:
  #   temperature: 0.7      # Output randomness (0.0 = deterministic, 2.0 = very random)
  #   top_p: 0.95           # Nucleus sampling threshold (0.0–1.0)
  #   max_tokens: 4096      # Maximum output tokens per reply
  #   top_k: 40             # Top-K sampling (provider support varies)

  # List of models (string or object with id, optional name, and optional params).
  # Per-model params override the global params above.
  models:
    # Simple string form:
    # - "model-id"
    #
    # Object form with optional display name and per-model param overrides:
    # - id: "openai/gpt-4o"
    #   name: "GPT-4o"
    #   params:
    #     temperature: 0.3
    #     max_tokens: 8192


  # Trace settings for LLM round-trip data
  trace:
    # Enable or disable the LLM trace drawer in the UI (default: true)
    enabled: true
    # How long raw LLM trace data is kept on assistant messages (default: 168h = 7 days).
    # Minimum allowed value is 1h (anything lower is clamped to 1h).
    # The cleanup job runs every <ttl> when ttl ≤ 12h, otherwise every 12h.
    # Examples: 1m, 6h, 1d, 7d, 30d
    ttl: 7d

log:
  # Log level: debug, info, warn, error (default: info)
  level: "info"

mcp:
  # Number of consecutive health check failures before unregistering (default: 3)
  # health_max_failures: 3

  # Health check interval (default: 15s)
  # health_interval: 15s

  # Reconnect interval for servers that fail to connect at startup or become
  # unreachable. Can be overridden per-server. (default: 30s)
  # reconnect_interval: 30s

  # Tool call timeout. Can be overridden per-server. (default: 30s)
  # timeout: 30s

  # How often to re-list tools from each connected MCP server to pick up additions,
  # removals, or schema changes. 0 (default) disables periodic rediscovery.
  # Can be overridden per-server. Go duration format: 30s, 5m, 1h, etc.
  # tool_rediscovery_interval: 0

  # List of MCP servers to connect at startup
  servers:
    # HTTP server example:
    # - name: "my-server"
    #   url: "http://localhost:8081/mcp"
    #   auth:
    #     token: "your-auth-token"      # Optional: auth token
    #   headers:
    #     X-Custom-Header: "value"      # Optional: custom headers
    #   disabled: false                 # Optional: set to true to skip this server
    #   reconnect_interval: 30s         # Optional: overrides global reconnect_interval
    #   health_max_failures: 3          # Optional: overrides global health_max_failures
    #   health_interval: 15s            # Optional: overrides global health_interval
    #   timeout: 30s                    # Optional: overrides global timeout
    #   insecure: false                 # Optional: skip TLS certificate verification
    #   tool_rediscovery_interval: 5m   # Optional: overrides global tool_rediscovery_interval

tools:
  # Required: at least one selectable system prompt.
  system_prompts:
    # - name: "Code Reviewer"
    #   file: "/path/to/code-reviewer.txt"
    # - name: "Customer Support"
    #   file: "/path/to/customer-support.txt"

ui:
  # Optional: App name shown in the header and browser title (default: "Chatbot")
  # app_name: "My Assistant"

  # Optional: App icon shown in the header.
  # Supports emoji/text or an image URL/path like "/logo.png".
  # app_icon: "🤖"

  # Optional: Welcome screen title
  # welcome_title: "How can I help you today?"

  # Optional: AI disclaimer shown below title (default: "AI can make mistakes. Verify important info.")
  # ai_disclaimer: "AI can make mistakes. Verify important info."

  # Optional: Quick prompt suggestions shown on welcome screen
  prompt_suggestions:
    #  - "Explain how this works"
    #  - "Help me write code"
    #  - "Summarize the key points"
    #  - "What are best practices?"