name: devel-release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"
  FLUTTER_VERSION: "3.41.9"
  BINARY_NAME: promptd
  java_version: 21 # major versions: 8, 11, 16, 17, 21
  java_distribution: 'zulu' # See 'Supported distributions' for available options

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.file }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build rolling changelog
        id: changelog
        run: |
          git fetch --tags --force
          notes_file="$RUNNER_TEMP/devel-notes.md"
          previous_ref=""
          if git rev-parse -q --verify "refs/tags/devel" >/dev/null; then
            previous_ref="devel"
          fi
          {
            echo "## Changelog"
            echo
            if [ -n "$previous_ref" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_ref}..HEAD"
            else
              git log -20 --pretty=format:'- %s (%h)'
            fi
          } > "$notes_file"
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Move rolling tag
        run: |
          git tag -f devel "$GITHUB_SHA"
          git push origin refs/tags/devel --force

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: devel-notes
          path: ${{ steps.changelog.outputs.file }}
          if-no-files-found: error

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: cache flutter
        uses: actions/cache@v4
        env:
          cache-name: cache-flutter
        with:
          path: |
            /opt/hostedtoolcache/flutter
            /home/runner/.pub-cache
            /home/runner/.gradle
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.java_distribution }}
          java-version: ${{ env.java_version }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable


      - run: flutter --version

      - name: Set up signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — refusing to build unsigned release"
            exit 1
          fi
          keystore_path="$PWD/console/android/keystore.jks"
          printenv KEYSTORE_BASE64 | base64 -d > "$keystore_path"
          chmod 600 "$keystore_path"
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" "$keystore_path" \
            > console/android/key.properties
          chmod 600 console/android/key.properties

      - name: Build APK and AAB
        run: |
          cd console
          flutter build apk --release \
            --build-name="0.0.0-devel" \
            --build-number="${{ github.run_number }}"
          flutter build appbundle --release \
            --build-name="0.0.0-devel" \
            --build-number="${{ github.run_number }}"

      - name: Clean up signing files
        if: always()
        run: rm -f console/android/keystore.jks console/android/key.properties

      - name: Collect artifacts
        run: |
          mkdir -p dist/android
          cp console/build/app/outputs/flutter-apk/app-release.apk \
            dist/android/promptd_devel_android.apk
          cp console/build/app/outputs/bundle/release/app-release.aab \
            dist/android/promptd_devel_android.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: dist/android/
          if-no-files-found: error

  build-ui:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build embedded UI (Flutter, airgap)
        run: make ui WITH_CONSOLE=1 AIRGAP=1

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist
          if-no-files-found: error

  build-binaries:
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            artifact_name: linux-amd64
            binary_name: promptd
            archive_name: promptd_devel_linux_amd64.tar.gz
          - goos: windows
            goarch: amd64
            goarm: ""
            artifact_name: windows-amd64
            binary_name: promptd.exe
            archive_name: promptd_devel_windows_amd64.zip
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact_name: linux-armv7
            binary_name: promptd
            archive_name: promptd_devel_linux_armv7.tar.gz
          - goos: linux
            goarch: arm64
            goarm: ""
            artifact_name: linux-arm64
            binary_name: promptd
            archive_name: promptd_devel_linux_arm64.tar.gz
          - goos: darwin
            goarch: amd64
            goarm: ""
            artifact_name: darwin-amd64
            binary_name: promptd
            archive_name: promptd_devel_darwin_amd64.tar.gz
          - goos: darwin
            goarch: arm64
            goarm: ""
            artifact_name: darwin-arm64
            binary_name: promptd
            archive_name: promptd_devel_darwin_arm64.tar.gz
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist

      - name: Build binary
        env:
          VERSION: devel
          GIT_COMMIT: ${{ github.sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X promptd/internal/version.version=${VERSION} -X promptd/internal/version.gitCommit=${GIT_COMMIT} -X promptd/internal/version.buildDate=${build_date}"
          CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}" ./cmd

      - name: Package archive
        run: |
          mkdir -p dist/release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist/${{ matrix.artifact_name }} && zip -9 "../release/${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
          else
            tar -C "dist/${{ matrix.artifact_name }}" -czf "dist/release/${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}
            dist/release/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build-binaries
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: devel-notes
          path: dist

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: devel
          name: Development Build
          body_path: dist/devel-notes.md
          prerelease: true
          make_latest: false
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/*.apk
            dist/*.aab

  docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_name: linux-amd64
            binary_path: dist/linux-amd64/promptd
          - platform: linux/arm64
            artifact_name: linux-arm64
            binary_path: dist/linux-arm64/promptd
          - platform: linux/arm/v7
            artifact_name: linux-armv7
            binary_path: dist/linux-armv7/promptd
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Set image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BINARY_PATH=${{ matrix.binary_path }}
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}-${{ matrix.artifact_name }}

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Set image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-amd64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-arm64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-armv7"
