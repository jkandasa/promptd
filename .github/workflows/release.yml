name: release

on:
  push:
    tags:
      - "v1.*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"
  FLUTTER_VERSION: "3.41.9"
  BINARY_NAME: promptd

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build embedded UI (Flutter, airgap)
        run: make ui WITH_CONSOLE=1 AIRGAP=1

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — refusing to build unsigned release"
            exit 1
          fi
          keystore_path="$PWD/console/android/keystore.jks"
          printenv KEYSTORE_BASE64 | base64 -d > "$keystore_path"
          chmod 600 "$keystore_path"
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" "$keystore_path" \
            > console/android/key.properties
          chmod 600 console/android/key.properties

      - name: Build APK and AAB
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          cd console
          flutter build apk --release \
            --build-name="$version" \
            --build-number="${{ github.run_number }}"
          flutter build appbundle --release \
            --build-name="$version" \
            --build-number="${{ github.run_number }}"

      - name: Clean up signing files
        if: always()
        run: rm -f console/android/keystore.jks console/android/key.properties

      - name: Collect artifacts
        run: |
          mkdir -p dist/android
          cp console/build/app/outputs/flutter-apk/app-release.apk \
            "dist/android/promptd_${{ github.ref_name }}_android.apk"
          cp console/build/app/outputs/bundle/release/app-release.aab \
            "dist/android/promptd_${{ github.ref_name }}_android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: dist/android/
          if-no-files-found: error

  build-binaries:
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            artifact_name: linux-amd64
            binary_name: promptd
            archive_name: promptd_linux_amd64.tar.gz
          - goos: windows
            goarch: amd64
            goarm: ""
            artifact_name: windows-amd64
            binary_name: promptd.exe
            archive_name: promptd_windows_amd64.zip
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact_name: linux-armv7
            binary_name: promptd
            archive_name: promptd_linux_armv7.tar.gz
          - goos: linux
            goarch: arm64
            goarm: ""
            artifact_name: linux-arm64
            binary_name: promptd
            archive_name: promptd_linux_arm64.tar.gz
          - goos: darwin
            goarch: amd64
            goarm: ""
            artifact_name: darwin-amd64
            binary_name: promptd
            archive_name: promptd_darwin_amd64.tar.gz
          - goos: darwin
            goarch: arm64
            goarm: ""
            artifact_name: darwin-arm64
            binary_name: promptd
            archive_name: promptd_darwin_arm64.tar.gz
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist

      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X promptd/internal/version.version=${VERSION} -X promptd/internal/version.gitCommit=${GIT_COMMIT} -X promptd/internal/version.buildDate=${build_date}"
          CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}" ./cmd

      - name: Package archive
        run: |
          mkdir -p dist/release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist/${{ matrix.artifact_name }} && zip -9 "../release/${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
          else
            tar -C "dist/${{ matrix.artifact_name }}" -czf "dist/release/${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}
            dist/release/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    needs: [build-binaries, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/*.apk
            dist/*.aab

  docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_name: linux-amd64
            binary_name: promptd
            binary_path: dist/linux-amd64/promptd
          - platform: linux/arm64
            artifact_name: linux-arm64
            binary_name: promptd
            binary_path: dist/linux-arm64/promptd
          - platform: linux/arm/v7
            artifact_name: linux-armv7
            binary_name: promptd
            binary_path: dist/linux-armv7/promptd
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Set image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BINARY_PATH=${{ matrix.binary_path }}
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}-${{ matrix.artifact_name }}

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Set image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-amd64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-arm64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-armv7"
