name: release

on:
  push:
    tags:
      - "v1.*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "24"
  YARN_VERSION: "4.9.2"
  BINARY_NAME: promptd

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: Build embedded UI
        run: make ui

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist
          if-no-files-found: error

  build-binaries:
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            artifact_name: linux-amd64
            binary_name: promptd
            archive_name: promptd_linux_amd64.tar.gz
          - goos: windows
            goarch: amd64
            goarm: ""
            artifact_name: windows-amd64
            binary_name: promptd.exe
            archive_name: promptd_windows_amd64.zip
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact_name: linux-armv7
            binary_name: promptd
            archive_name: promptd_linux_armv7.tar.gz
          - goos: linux
            goarch: arm64
            goarm: ""
            artifact_name: linux-arm64
            binary_name: promptd
            archive_name: promptd_linux_arm64.tar.gz
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist

      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X promptd/internal/version.version=${VERSION} -X promptd/internal/version.gitCommit=${GIT_COMMIT} -X promptd/internal/version.buildDate=${build_date}"
          CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}" ./cmd

      - name: Package archive
        run: |
          mkdir -p dist/release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist/${{ matrix.artifact_name }} && zip -9 "../release/${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
          else
            tar -C "dist/${{ matrix.artifact_name }}" -czf "dist/release/${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }}
            dist/release/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip

  docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_name: linux-amd64
            binary_name: promptd
            binary_path: dist/linux-amd64/promptd
          - platform: linux/arm64
            artifact_name: linux-arm64
            binary_name: promptd
            binary_path: dist/linux-arm64/promptd
          - platform: linux/arm/v7
            artifact_name: linux-armv7
            binary_name: promptd
            binary_path: dist/linux-armv7/promptd
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Set image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/release.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BINARY_PATH=${{ matrix.binary_path }}
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}-${{ matrix.artifact_name }}

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Set image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-amd64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-arm64" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}-linux-armv7"
